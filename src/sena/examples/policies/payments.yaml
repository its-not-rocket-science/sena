[
  {
    "id": "payment_block_unverified_vendor",
    "description": "Vendor payments must use a verified vendor account",
    "severity": "critical",
    "inviolable": true,
    "applies_to": ["approve_vendor_payment"],
    "condition": {"field": "vendor_verified", "eq": false},
    "decision": "BLOCK",
    "reason": "Payment blocked because vendor verification is required."
  },
  {
    "id": "payment_requires_human_review_over_threshold",
    "description": "Payments above threshold require finance director approval",
    "severity": "high",
    "inviolable": false,
    "applies_to": ["approve_vendor_payment"],
    "condition": {
      "and": [
        {"field": "amount", "gte": 10000},
        {"field": "requester_role", "neq": "finance_director"}
      ]
    },
    "decision": "ESCALATE",
    "reason": "High-value payments require finance director approval."
  }
]
