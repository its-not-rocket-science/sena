[
  {
    "id": "export_block_ssn_without_consent",
    "description": "Block SSN exports unless explicit consent basis is present",
    "severity": "critical",
    "inviolable": true,
    "applies_to": ["export_customer_data"],
    "condition": {
      "and": [
        {"field": "requested_fields", "contains": "ssn"},
        {"field": "legal_basis", "neq": "consent"}
      ]
    },
    "decision": "BLOCK",
    "reason": "SSN export blocked due to missing consent legal basis."
  },
  {
    "id": "export_escalate_sensitive_fields_without_dpo",
    "description": "Escalate sensitive exports when DPO approval is missing",
    "severity": "high",
    "inviolable": false,
    "applies_to": ["export_customer_data"],
    "condition": {
      "and": [
        {"field": "requested_fields", "contains": "date_of_birth"},
        {"field": "dpo_approved", "eq": false}
      ]
    },
    "decision": "ESCALATE",
    "reason": "Sensitive export requires DPO approval."
  }
]
