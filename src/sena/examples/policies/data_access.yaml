[
  {
    "id": "never_export_ssn_without_legal_basis",
    "description": "SSN exports require a valid legal basis",
    "severity": "critical",
    "inviolable": true,
    "applies_to": ["export_customer_data"],
    "condition": {
      "and": [
        {"field": "requested_fields", "contains": "ssn"},
        {"field": "legal_basis", "neq": "consent"}
      ]
    },
    "decision": "BLOCK",
    "reason": "SSN export blocked due to missing valid legal basis."
  },
  {
    "id": "export_requires_dpo_for_sensitive_data",
    "description": "Sensitive field exports require DPO review",
    "severity": "high",
    "inviolable": false,
    "applies_to": ["export_customer_data"],
    "condition": {
      "and": [
        {"field": "requested_fields", "contains": "date_of_birth"},
        {"field": "dpo_approved", "eq": false}
      ]
    },
    "decision": "ESCALATE",
    "reason": "Sensitive export requires DPO approval."
  }
]
