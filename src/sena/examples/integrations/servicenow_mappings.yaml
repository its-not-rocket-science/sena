routes:
  change_approval.requested:
    action_type: approve_vendor_payment
    actor_id_path: requested_by.user_id
    actor_role_path: requested_by.role
    request_id_path: change_request.number
    source_record_id_path: change_request.sys_id
    static_source_object_type: change_request
    static_workflow_stage: requested
    static_requested_action: approve_vendor_payment
    correlation_key_path: change_request.number
    required_fields:
      - change_request.number
      - change_request.sys_id
      - requested_by.user_id
      - risk.level
      - classification
      - schedule.window
      - approver_chain
      - cab_review
    attributes:
      risk_level: risk.level
      change_classification: classification
      environment: environment
      schedule_window: schedule.window
      emergency_change: flags.emergency
      privileged_change: flags.privileged
      out_of_hours_change: flags.out_of_hours
      approver_chain: approver_chain
      approver_chain_missing: approver_chain_missing
      cab_review_evidence_id: cab_review.evidence_id
      cab_review_missing: cab_review_missing
      requested_start: schedule.start
      requested_end: schedule.end
    risk_attributes:
      risk_level: risk.level
      emergency_change: flags.emergency
      privileged_change: flags.privileged
      out_of_hours_change: flags.out_of_hours
    evidence_references_path: cab_review.evidence_id
    static_attributes:
      approval_workflow: enterprise_change
      governance_model: cab_and_role_chain
    policy_bundle: enterprise-demo
outbound:
  mode: callback
