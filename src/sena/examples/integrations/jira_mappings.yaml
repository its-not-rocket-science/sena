routes:
  jira:issue_updated:
    action_type: approve_vendor_payment
    actor_id_path: user.accountId
    request_id_path: issue.key
    source_record_id_path: issue.id
    static_source_object_type: jira_issue
    static_workflow_stage: pending_approval
    static_requested_action: approve_vendor_payment
    external_state_path: issue.fields.status.name
    previous_external_state_path: issue.fields.previous_status.name
    external_to_internal_state:
      Pending Approval: pending_approval
      In Review: in_review
      Approved: approved
      Rejected: rejected
    internal_to_external_state:
      blocked: Rejected
      allowed: Approved
      approved: Approved
      rejected: Rejected
    allowed_state_transitions:
      pending_approval:
        - in_review
        - approved
        - rejected
      in_review:
        - pending_approval
        - approved
        - rejected
    correlation_key_path: issue.key
    required_fields:
      - issue.id
      - issue.key
      - user.accountId
      - issue.fields.customfield_approval_amount
    attributes:
      amount: issue.fields.customfield_approval_amount
      requester_role: issue.fields.customfield_requester_role
      vendor_verified: issue.fields.customfield_vendor_verified
      jira_transition: changelog.items
    context_fields:
      ticket_priority: issue.fields.priority.name
      business_unit: issue.fields.customfield_business_unit
    metadata_fields:
      tenant_id: issue.fields.customfield_tenant_id
      workflow_id: issue.fields.customfield_workflow_id
    required_metadata_fields:
      - tenant_id
      - workflow_id
    sla_deadline_path: issue.fields.customfield_sla_deadline_at
    escalation_deadline_path: issue.fields.customfield_escalation_deadline_at
    risk_attributes:
      approval_amount: issue.fields.customfield_approval_amount
      vendor_verified: issue.fields.customfield_vendor_verified
    evidence_references_path: issue.key
    static_attributes:
      approval_workflow: finance
    policy_bundle: enterprise-demo
  jira:issue_created:
    action_type: export_customer_data
    actor_id_path: user.accountId
    source_record_id_path: issue.id
    static_source_object_type: jira_issue
    static_workflow_stage: intake
    static_requested_action: export_customer_data
    correlation_key_path: issue.key
    required_fields:
      - issue.id
      - issue.key
      - user.accountId
    attributes:
      requested_fields: issue.fields.customfield_requested_fields
      legal_basis: issue.fields.customfield_legal_basis
      dpo_approved: issue.fields.customfield_dpo_approved
    risk_attributes:
      dpo_approved: issue.fields.customfield_dpo_approved
outbound:
  mode: both
  max_attempts: 3
