name: maturity-scorecard

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  maturity-scorecard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and CI tools
        run: |
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run style checks
        run: ruff check src tests

      - name: Ensure artifacts directory exists
        run: mkdir -p artifacts

      - name: Run benchmarks
        run: pytest benchmarks/ --benchmark-only --benchmark-json artifacts/benchmark.json

      - name: Run bandit
        run: bandit -r src/sena -f json -o bandit-report.json

      - name: Run safety
        run: |
          safety check --full-report || safety scan --target . --output text

      - name: Compute maturity scorecard
        run: python scripts/maturity_scorecard.py --output-json artifacts/maturity_scorecard.json

      - name: Persist timestamped scorecard
        run: |
          mkdir -p artifacts/history
          cp artifacts/maturity_scorecard.json "artifacts/history/maturity_scorecard_${{ github.run_id }}.json"

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: maturity-scorecard-${{ github.run_id }}
          path: artifacts/maturity_scorecard.json
          if-no-files-found: error

      - name: Upload scorecard history artifact
        uses: actions/upload-artifact@v4
        with:
          name: maturity-scorecard-history-${{ github.run_id }}
          path: artifacts/history/maturity_scorecard_${{ github.run_id }}.json
          if-no-files-found: error

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.run_id }}
          path: artifacts/benchmark.json
          if-no-files-found: error

      - name: Upload bandit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-${{ github.run_id }}
          path: bandit-report.json
          if-no-files-found: error
