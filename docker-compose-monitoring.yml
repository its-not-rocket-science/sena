services:
  sena-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SENA_API_HOST: 0.0.0.0
      SENA_API_PORT: 8000
      SENA_POLICY_DIR: /app/src/sena/examples/policies
      SENA_BUNDLE_NAME: enterprise-compliance-controls
      SENA_BUNDLE_VERSION: "2026.03"
      SENA_AUDIT_SINK_JSONL: /var/lib/sena/audit/demo_audit.jsonl
    volumes:
      - ./monitoring/artifacts:/var/lib/sena/audit
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - sena-api
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
